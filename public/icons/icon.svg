<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1200"/>
      <stop offset="100%" stop-color="#0a0800"/>
    </linearGradient>
    <radialGradient id="coin" cx="45%" cy="38%" r="60%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#fff7c2"/>
      <stop offset="30%"  stop-color="#fde047"/>
      <stop offset="70%"  stop-color="#ca8a04"/>
      <stop offset="100%" stop-color="#78350f"/>
    </radialGradient>
    <radialGradient id="rim" cx="50%" cy="50%" r="50%" gradientUnits="objectBoundingBox">
      <stop offset="0%"  stop-color="#92400e"/>
      <stop offset="100%" stop-color="#451a03"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)" rx="115"/>

  <!-- Drop shadow -->
  <ellipse cx="265" cy="292" rx="142" ry="30" fill="#000" opacity="0.45"/>

  <!-- Rim (depth offset) -->
  <ellipse cx="261" cy="270" rx="146" ry="146" fill="url(#rim)"/>

  <!-- Coin face -->
  <ellipse cx="256" cy="256" rx="138" ry="138" fill="url(#coin)"/>

  <!-- Raised inner ring -->
  <ellipse cx="256" cy="256" rx="112" ry="112" stroke="#92400e" stroke-width="6" fill="none" opacity="0.5"/>
  <ellipse cx="256" cy="256" rx="113" ry="113" stroke="#fef08a" stroke-width="2" fill="none" opacity="0.3"/>

  <!-- Embossed अ — shadow (offset down-right) -->
  <text x="266" y="302" text-anchor="middle" font-size="148" font-weight="900" fill="#78350f" opacity="0.55" font-family="serif">अ</text>

  <!-- Embossed अ — highlight (offset up-left) -->
  <text x="252" y="288" text-anchor="middle" font-size="148" font-weight="900" fill="#fff7c2" opacity="0.2" font-family="serif">अ</text>

  <!-- Embossed अ — main -->
  <text x="256" y="292" text-anchor="middle" font-size="148" font-weight="900" fill="#78350f" opacity="0.85" font-family="serif">अ</text>

  <!-- Rim highlight arc -->
  <path d="M136 204 Q154 128 232 110" stroke="#fef9c3" stroke-width="6" fill="none" opacity="0.2" stroke-linecap="round"/>
</svg>
